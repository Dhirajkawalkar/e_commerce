name: e_commerce
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.5
  get_it: ^9.2.1
  google_fonts: ^8.0.2
  skeletonizer: ^2.1.3
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

# 👇 IMPORTANT: This must be OUTSIDE the flutter section
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"